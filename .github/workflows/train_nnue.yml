name: NNUE Training (Phase 16.5)

# Manual trigger only — run from the Actions tab ("Run workflow" button),
# fully usable from the mobile GitHub app, no terminal needed (D15).
#
# Prerequisite: you need the Run IDs of a completed selfplay.yml run and a
# completed lichess_sample.yml run. Find these on the Actions tab: open the
# run, the Run ID is the number in the URL
# (.../actions/runs/<RUN_ID>) or shown under the run title.
on:
  workflow_dispatch:
    inputs:
      selfplay_run_id:
        description: "Optional: comma-separated Run ID(s) of selfplay.yml runs to include. Leave blank if only using selfplay_paths/selfplay_urls below."
        required: false
        default: ""
        type: string
      selfplay_paths:
        description: "Optional: comma-separated repo-relative paths to committed self-play .txt files (e.g. data/selfplay/selfplay_data_seed0_n3000.txt from the Kaggle notebook). Leave blank if only using selfplay_run_id/selfplay_urls."
        required: false
        default: ""
        type: string
      selfplay_urls:
        description: "Optional: comma-separated direct download URLs for self-play .txt files too large for the 25MB repo-upload UI — e.g. a GitHub Release asset URL (Releases support much larger attachments via the same mobile web UI). Leave blank if not needed."
        required: false
        default: ""
        type: string
      lichess_run_id:
        description: "Run ID of the lichess_sample.yml run to pull lichess_sample.txt from"
        required: true
        type: string
      epochs:
        description: "Training epochs"
        required: false
        default: "10"
        type: string
      learning_rate:
        description: "Adam learning rate"
        required: false
        default: "0.001"
        type: string
      batch_size:
        description: "Minibatch size"
        required: false
        default: "256"
        type: string
      hidden_size:
        description: "Hidden layer width"
        required: false
        default: "32"
        type: string
      accumulator_size:
        description: "Accumulator (feature transform output) width"
        required: false
        default: "256"
        type: string
      lambda:
        description: "D14 blend weight: eval-target vs game-result-target (1.0 = eval only, self-play rows only affected)"
        required: false
        default: "0.7"
        type: string
      seed:
        description: "RNG seed for weight init and shuffling"
        required: false
        default: "42"
        type: string
      weight_decay:
        description: "D30/D31/D33: AdamW-style decoupled weight decay, applied to weight tensors (not biases) every batch step. Prevents unbounded output-logit growth (see DECISIONS.md D30/D33). 0.0001 was confirmed too weak — network still saturated at the clamp ceiling on real in-distribution positions. Raised default 100x. 0 disables."
        required: false
        default: "0.01"
        type: string
      grad_clip_norm:
        description: "D33: global-norm gradient clipping applied before each Adam step, over the whole gradient including biases. Complementary to weight_decay — caps the update magnitude directly rather than only pulling weights toward zero passively. 0 disables."
        required: false
        default: "1.0"
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  train:
    name: Train NORU NNUE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: train-nnue-release

      - name: Download self-play data artifacts
        # Optional — only runs if selfplay_run_id was provided. Loops over a
        # comma-separated list so multiple GH Actions self-play batches can
        # be combined in one training run.
        if: inputs.selfplay_run_id != ''
        run: |
          mkdir -p data/selfplay
          IFS=',' read -ra RUN_IDS <<< "${{ inputs.selfplay_run_id }}"
          for rid in "${RUN_IDS[@]}"; do
            rid=$(echo "$rid" | xargs)
            echo "Downloading self-play artifact from run $rid"
            gh run download "$rid" --repo g-c-3/pet-dragon --dir "data/selfplay/run_${rid}"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download self-play data from URLs
        # Optional — only runs if selfplay_urls was provided. For files too
        # large for GitHub's 25MB web-upload limit (e.g. long Kaggle runs);
        # host them as GitHub Release assets instead, which support much
        # larger attachments via the same mobile web UI, and paste the
        # asset's direct download URL here.
        if: inputs.selfplay_urls != ''
        run: |
          mkdir -p data/selfplay_url
          IFS=',' read -ra URLS <<< "${{ inputs.selfplay_urls }}"
          i=0
          for url in "${URLS[@]}"; do
            url=$(echo "$url" | xargs)
            i=$((i+1))
            echo "Downloading self-play data from $url"
            curl -sL "$url" -o "data/selfplay_url/url_${i}.txt"
          done

      - name: Download Lichess sample artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.lichess_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: data/lichess

      - name: Locate self-play data files
        id: locate
        # Combines three sources: (a) GH Actions artifacts downloaded above
        # (if selfplay_run_id was given), (b) self-play files already
        # committed to the repo (if selfplay_paths was given), and (c)
        # self-play files downloaded from direct URLs, e.g. GitHub Release
        # assets (if selfplay_urls was given). At least one source must
        # yield files.
        run: |
          FILES=()
          if [ -d data/selfplay ]; then
            while IFS= read -r f; do FILES+=("$f"); done < <(find data/selfplay -name '*.txt')
          fi
          if [ -d data/selfplay_url ]; then
            while IFS= read -r f; do FILES+=("$f"); done < <(find data/selfplay_url -name '*.txt')
          fi
          if [ -n "${{ inputs.selfplay_paths }}" ]; then
            IFS=',' read -ra PATHS <<< "${{ inputs.selfplay_paths }}"
            for p in "${PATHS[@]}"; do
              p=$(echo "$p" | xargs)
              if [ ! -f "$p" ]; then
                echo "ERROR: committed self-play path not found in checkout: $p"
                exit 1
              fi
              FILES+=("$p")
            done
          fi
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "ERROR: no self-play data files found — provide selfplay_run_id, selfplay_paths, and/or selfplay_urls"
            exit 1
          fi
          SELFPLAY_FILES=$(IFS=,; echo "${FILES[*]}")
          LICHESS_FILE=$(find data/lichess -name '*.txt' | head -n1)
          if [ -z "$LICHESS_FILE" ]; then
            echo "ERROR: could not find lichess data file"
            find data -type f
            exit 1
          fi
          echo "selfplay_files=$SELFPLAY_FILES" >> "$GITHUB_OUTPUT"
          echo "lichess_file=$LICHESS_FILE" >> "$GITHUB_OUTPUT"
          wc -l $(echo "$SELFPLAY_FILES" | tr ',' ' ') "$LICHESS_FILE"

      - name: Build train_nnue binary
        run: cargo build --release --bin train_nnue

      - name: Run training
        run: >
          ./target/release/train_nnue
          nnue_pet_dragon
          "${{ steps.locate.outputs.selfplay_files }},${{ steps.locate.outputs.lichess_file }}"
          ${{ inputs.epochs }}
          ${{ inputs.learning_rate }}
          ${{ inputs.batch_size }}
          ${{ inputs.hidden_size }}
          ${{ inputs.accumulator_size }}
          ${{ inputs.lambda }}
          ${{ inputs.seed }}
          ${{ inputs.weight_decay }}

      - name: Report output sizes
        run: ls -lh nnue_pet_dragon_fp32.bin nnue_pet_dragon_quantized.bin

      - name: Upload trained network as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nnue-pet-dragon-h${{ inputs.hidden_size }}-a${{ inputs.accumulator_size }}-e${{ inputs.epochs }}
          path: |
            nnue_pet_dragon_fp32.bin
            nnue_pet_dragon_quantized.bin
          retention-days: 30
