name: Self-Play Data Generation (Sharded, D50)

# Manual trigger only — run from the Actions tab ("Run workflow" button),
# fully usable from the mobile GitHub app, no terminal needed.
#
# Phase 23.3 / D50: fans out across `shards` parallel runners instead of
# one sequential job, then merges every shard's output into a single
# combined artifact. Each shard uses a disjoint seed range (shard i gets
# seed_start + i*games_per_shard .. +games_per_shard-1), so shards never
# regenerate the same games as each other, and re-running with a new
# seed_start keeps every run's games distinct from every prior run too —
# same reproducibility contract as the old single-job workflow, just
# fanned out. Total games per run = shards * games_per_shard.
#
# Phase 23.4 / D67 (Session 84): each shard also now produces a second,
# separate output — one row per game (starting_seed | rook_files |
# knight_files | root_move_uci | game_result) for the bucketed opening
# statistics pipeline. Uploaded and merged the same way as the main NNUE
# data, as its own artifact (`opening-data-combined-...`) — this does not
# change the primary selfplay artifact's contents or name.
on:
  workflow_dispatch:
    inputs:
      shards:
        description: "Number of parallel shards (independent runners). Keep at or below ~15 so this doesn't starve concurrently-running build/test/gate jobs on a free-tier concurrent-job limit."
        required: false
        default: "10"
        type: string
      games_per_shard:
        description: "Self-play games generated by each shard"
        required: false
        default: "300"
        type: string
      seed_start:
        description: "Base seed for this run. Shard i uses seed_start + i*games_per_shard. Change this between runs (e.g. bump by shards*games_per_shard) to keep accumulating distinct games instead of regenerating the same ones."
        required: false
        default: "0"
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Compute the shard list from the `shards` input ──────────────────
  # GitHub Actions matrices must be a static-looking JSON list at the
  # syntax level, but that list can come from a prior job's output via
  # fromJson() — this job builds [0, 1, ..., shards-1] in plain bash (no
  # extra runtime dependency) so `shards` stays a normal workflow_dispatch
  # number input instead of a fixed, unchangeable matrix in the YAML.
  plan-shards:
    name: Plan Shards
    runs-on: ubuntu-latest
    outputs:
      shard_list: ${{ steps.plan.outputs.shard_list }}
    steps:
      - name: Build shard index list
        id: plan
        run: |
          n="${{ inputs.shards }}"
          list="["
          for i in $(seq 0 $((n - 1))); do
            list="${list}${i},"
          done
          list="${list%,}]"
          echo "shard_list=${list}" >> "$GITHUB_OUTPUT"
          echo "Planned shards: ${list}"

  # ── One independent self-play batch per shard ───────────────────────
  selfplay-shard:
    name: Shard ${{ matrix.shard }}
    needs: plan-shards
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.plan-shards.outputs.shard_list) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: selfplay-release

      - name: Build selfplay binary
        run: cargo build --release --bin selfplay

      - name: Compute this shard's seed range
        id: seed
        run: |
          shard_seed=$(( ${{ inputs.seed_start }} + ${{ matrix.shard }} * ${{ inputs.games_per_shard }} ))
          echo "shard_seed=${shard_seed}" >> "$GITHUB_OUTPUT"
          echo "Shard ${{ matrix.shard }}: seeds ${shard_seed}..$((shard_seed + ${{ inputs.games_per_shard }} - 1))"

      - name: Run self-play generation for this shard
        run: >
          ./target/release/selfplay
          ${{ inputs.games_per_shard }}
          selfplay_data_shard.txt
          ${{ steps.seed.outputs.shard_seed }}
          opening_data_shard.txt

      - name: Report shard output size
        run: |
          wc -l selfplay_data_shard.txt
          ls -lh selfplay_data_shard.txt
          echo "--- opening-stats output (Phase 23.4, D67) ---"
          wc -l opening_data_shard.txt
          ls -lh opening_data_shard.txt

      - name: Upload shard artifact
        uses: actions/upload-artifact@v6
        with:
          name: selfplay-shard-${{ matrix.shard }}
          path: selfplay_data_shard.txt
          retention-days: 1 # intermediate only — the merge job below folds these into one combined artifact that keeps the real 30-day retention

      - name: Upload opening-stats shard artifact
        uses: actions/upload-artifact@v6
        with:
          name: opening-shard-${{ matrix.shard }}
          path: opening_data_shard.txt
          retention-days: 1 # intermediate only, same as the NNUE shard artifact above

  # ── Merge every shard's output into one downloadable file ───────────
  # Runs even if some shards failed (`if: always()`) so a single flaky
  # shard doesn't throw away every other shard's already-generated data —
  # the merge report makes it obvious if fewer than `shards` files landed.
  merge-shards:
    name: Merge Shard Outputs
    needs: selfplay-shard
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all shard artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: selfplay-shard-*
          path: shards
          merge-multiple: false

      - name: Concatenate into one combined file
        run: |
          shopt -s nullglob globstar
          files=(shards/**/*.txt)
          echo "Merging ${#files[@]} shard file(s) (expected ${{ inputs.shards }})"
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No shard output files found — every shard must have failed. Nothing to merge." >&2
            exit 1
          fi
          cat "${files[@]}" > selfplay_data_combined.txt
          wc -l selfplay_data_combined.txt
          ls -lh selfplay_data_combined.txt
          if [ "${#files[@]}" -lt "${{ inputs.shards }}" ]; then
            echo "::warning::Only ${#files[@]}/${{ inputs.shards }} shards succeeded — combined file has less data than a full run would."
          fi

      - name: Upload combined training data
        uses: actions/upload-artifact@v6
        with:
          name: selfplay-data-combined-seed${{ inputs.seed_start }}-${{ inputs.shards }}x${{ inputs.games_per_shard }}
          path: selfplay_data_combined.txt
          retention-days: 30

      - name: Download all opening-stats shard artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: opening-shard-*
          path: opening_shards
          merge-multiple: false

      - name: Concatenate opening-stats shards (Phase 23.4, D67)
        run: |
          shopt -s nullglob globstar
          files=(opening_shards/**/*.txt)
          echo "Merging ${#files[@]} opening-stats shard file(s) (expected ${{ inputs.shards }})"
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::warning::No opening-stats shard files found — skipping combined opening-stats artifact. Selfplay data above is unaffected."
          else
            cat "${files[@]}" > opening_data_combined.txt
            wc -l opening_data_combined.txt
            ls -lh opening_data_combined.txt
          fi

      - name: Upload combined opening-stats data
        if: hashFiles('opening_data_combined.txt') != ''
        uses: actions/upload-artifact@v6
        with:
          name: opening-data-combined-seed${{ inputs.seed_start }}-${{ inputs.shards }}x${{ inputs.games_per_shard }}
          path: opening_data_combined.txt
          retention-days: 30
