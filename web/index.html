<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Dragon Chess</title>
<style>
  /* ── Reset & base ───────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 8px 32px;
  }

  /* ── Header ─────────────────────────────────────────────────────────── */
  header {
    text-align: center;
    margin-bottom: 16px;
  }
  header h1 {
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, #c8a96e 0%, #f0d08a 50%, #c8a96e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    font-size: 0.78rem;
    color: #777;
    margin-top: 3px;
  }

  /* ── Game-end celebration overlay ───────────────────────────────────── */
  #firework-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 9999;
  }

  /* ── App card ───────────────────────────────────────────────────────── */
  /* Elevated panel wrapping players/status/board/controls, giving the page
     a "designed app" feel instead of loose elements on a flat background. */
  #app-card {
    width: min(92vw, 480px);
    background: #141414;
    border: 1px solid #262626;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    padding: 18px 16px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Player panels ──────────────────────────────────────────────────── */
  #players {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }
  .player-panel {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #1b1b1b;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .player-panel.active {
    border-color: #c8a96e;
    background: #201a10;
    box-shadow: 0 0 0 1px rgba(200,169,110,0.25) inset;
  }
  .player-icon { font-size: 1.25rem; line-height: 1; }
  .player-name {
    font-size: 0.86rem;
    font-weight: 600;
    color: #bbb;
    transition: color 0.2s;
  }
  .player-panel.active .player-name { color: #f0d08a; }

  /* ── Captured pieces tray ───────────────────────────────────────────── */
  .captured {
    margin-left: auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-content: center;
    gap: 3px;
    max-width: 58%;
  }
  .cap-item {
    display: flex;
    align-items: center;
    gap: 2px;
    background: #1c1c1c;
    border: 1px solid #383838;
    border-radius: 4px;
    padding: 1px 4px 1px 2px;
    flex-shrink: 0;
  }
  .cap-piece {
    width: clamp(13px, 4.2vw, 18px);   /* ≈33% of the on-board piece size */
    aspect-ratio: 1;
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    flex-shrink: 0;
    opacity: 0.92;
  }
  .cap-count {
    font-size: 0.66rem;
    font-weight: 700;
    color: #ccc;
    line-height: 1;
  }

  /* ── Status bar ─────────────────────────────────────────────────────── */
  #status {
    font-size: 0.92rem;
    font-weight: 500;
    color: #c8a96e;
    min-height: 1.4em;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 0.02em;
  }

  /* ── Board wrapper ──────────────────────────────────────────────────── */
  #board-wrap {
    position: relative;
    width: 100%;
  }

  /* ── Coordinates ────────────────────────────────────────────────────── */
  .coords-rank {
    position: absolute;
    left: -18px;
    top: 0;
    width: 18px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .coords-file {
    position: absolute;
    bottom: -18px;
    left: 0;
    width: 100%;
    height: 18px;
    display: flex;
  }
  .coord {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: #555;
    font-weight: 600;
  }
  
  /* ── Board ──────────────────────────────────────────────────────────── */
  #board {
    width: 100%;
    aspect-ratio: 1;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    border: 2px solid #333;
    border-radius: 6px;
    overflow: hidden;
    user-select: none;
    box-shadow: 0 4px 18px rgba(0,0,0,0.5);
  }

  .sq {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.1s;
  }
  .sq.light { background: #976c49; }
  .sq.dark  { background: #5a4423; }

  .sq.selected       { background: #f6f669 !important; }
  .sq.last-from      { background: #cdd16a !important; }
  .sq.last-to        { background: #aab827 !important; }
  .sq.legal-dot::after {
    content: '';
    position: absolute;
    width: 28%;
    height: 28%;
    border-radius: 50%;
    background: rgba(0,0,0,0.18);
  }
  .sq.legal-capture::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 4px solid rgba(0,0,0,0.18);
  }
  .sq.in-check { background: #e44 !important; }

  /* ── Pieces ─────────────────────────────────────────────────────────── */
  .piece {
    width: 88%;
    height: 88%;
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    pointer-events: none;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.45));
    z-index: 1;
  }
  .piece-K { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_klt45.svg'); }
  .piece-K {
    filter:
      drop-shadow(0 0 1px rgba(255,255,255,0.95))
      drop-shadow(0 0 1.5px rgba(255,255,255,0.7))
      drop-shadow(0 1px 2px rgba(0,0,0,0.45));
  }
  .piece-Q { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_qlt45.svg'); }
  .piece-R { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_rlt45.svg'); }
  .piece-B { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_blt45.svg'); }
  .piece-N { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_nlt45.svg'); }
  .piece-P { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_plt45.svg'); }
  .piece-k { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_klt45.svg'); }
  .piece-q { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_qlt45.svg'); }
  .piece-r { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_rlt45.svg'); }
  .piece-b { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_blt45.svg'); }
  .piece-n { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_nlt45.svg'); }
  .piece-p { background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Chess_plt45.svg'); }

  .piece-k, .piece-q, .piece-r, .piece-b, .piece-n, .piece-p {
    filter: invert(1) drop-shadow(0 1px 2px rgba(0,0,0,0.5));
  }

  /* ── Controls ───────────────────────────────────────────────────────── */
  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 20px;
    justify-content: center;
    width: 100%;
  }
  button {
    padding: 9px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 600;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.96); }

  #btn-new  { background: #c8a96e; color: #111; }

  /* ── Move navigator ─────────────────────────────────────────────────── */
  #nav-controls {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #nav-controls button {
    background: #2a2a2a;
    color: #ccc;
    border: 1px solid #444;
    padding: 9px 12px;
    font-size: 1rem;
    line-height: 1;
  }
  #nav-controls button:disabled {
    opacity: 0.35;
    cursor: default;
  }
  #nav-controls button:disabled:active { transform: none; }
  #move-counter {
    font-size: 0.74rem;
    color: #777;
    min-width: 52px;
    text-align: center;
  }

  #side-select {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 0.82rem;
    color: #888;
    border-radius: 6px;
    padding: 3px 7px;
    transition: opacity 0.3s;
  }
  #side-select label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
  #side-select input[type=radio] { accent-color: #c8a96e; }

  @keyframes side-select-glow {
    0%   { box-shadow: 0 0 6px 1px #ff3b3b; }
    16%  { box-shadow: 0 0 6px 1px #ff9d3b; }
    33%  { box-shadow: 0 0 6px 1px #f4ff3b; }
    50%  { box-shadow: 0 0 6px 1px #3bff5c; }
    66%  { box-shadow: 0 0 6px 1px #3bd4ff; }
    83%  { box-shadow: 0 0 6px 1px #6a3bff; }
    100% { box-shadow: 0 0 6px 1px #ff3b3b; }
  }
  #side-select.pulsate { animation: side-select-glow 1.8s linear infinite; }

  /* ── Think time ─────────────────────────────────────────────────────── */
  #time-wrap {
    font-size: 0.82rem;
    color: #777;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #time-wrap select {
    background: #1e1e1e;
    color: #ccc;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 0.82rem;
  }

  /* ── Promotion modal ────────────────────────────────────────────────── */
  #promo-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #promo-modal.show { display: flex; }
  #promo-box {
    background: #1e1e1e;
    border: 1px solid #444;
    border-radius: 10px;
    padding: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .promo-choice {
    width: 60px;
    height: 60px;
    font-size: 2.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2a2a2a;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }
  .promo-choice:hover { border-color: #c8a96e; }

  /* ── Info panel ─────────────────────────────────────────────────────── */
  #info {
    margin-top: 18px;
    font-size: 0.75rem;
    color: #555;
    text-align: center;
    line-height: 1.8;
    max-width: 480px;
  }
  #info a { color: #777; }

  /* ── AI self-play toggle row (split: toggle | win probability) ──────── */
  #ai-toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    width: 100%;
    flex-wrap: wrap;
  }
  #ai-toggle-left {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.86rem;
    color: #bbb;
    font-weight: 600;
    flex-shrink: 0;
  }
  #ai-toggle-divider {
    width: 1px;
    align-self: stretch;
    background: #2a2a2a;
  }
  #winprob {
    flex: 1;
    min-width: 130px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #winprob-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: #999;
    font-weight: 600;
  }
  #winprob-labels b { color: #e8d9b5; font-weight: 700; }
  #winprob-bar {
    width: 100%;
    height: 7px;
    border-radius: 4px;
    background: #2a2a2a;
    overflow: hidden;
  }
  #winprob-fill {
    height: 100%;
    background: linear-gradient(90deg, #f0d08a, #c8a96e);
    transition: width 0.4s ease;
  }
  .switch {
    position: relative;
    display: inline-block;
    width: 42px;
    height: 24px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #2a2a2a;
    border: 1px solid #444;
    transition: background-color 0.2s, border-color 0.2s;
    border-radius: 24px;
  }
  .slider::before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 2px;
    bottom: 2px;
    background-color: #ccc;
    transition: transform 0.2s, background-color 0.2s;
    border-radius: 50%;
  }
  .switch input:checked + .slider { background-color: #c8a96e; border-color: #c8a96e; }
  .switch input:checked + .slider::before { transform: translateX(18px); background-color: #141414; }
  #side-select.disabled { opacity: 0.45; pointer-events: none; }
</style>
</head>
  
<body>

<canvas id="firework-canvas"></canvas>

<header>
  <h1>🐉 Pet Dragon</h1>
  <p>Original chess variant · Every game starts differently</p>
</header>

<div id="app-card">

  <div id="ai-toggle-row">
    <div id="ai-toggle-left">
      <label class="switch">
        <input type="checkbox" id="ai-toggle">
        <span class="slider"></span>
      </label>
      <span>AI Self-Play</span>
    </div>
    <div id="ai-toggle-divider"></div>
    <div id="winprob">
      <div id="winprob-labels">
        <span><span id="winprob-left-name">Engine</span> <b id="winprob-left-pct">50%</b></span>
        <span><b id="winprob-right-pct">50%</b> <span id="winprob-right-name">You</span></span>
      </div>
      <div id="winprob-bar"><div id="winprob-fill"></div></div>
    </div>
  </div>

  <div id="players">
    <div class="player-panel" id="panel-engine">
      <span class="player-icon">🐉</span>
      <span class="player-name">Pet Dragon Engine</span>
      <div class="captured" id="captured-engine"></div>
    </div>
    <div class="player-panel" id="panel-human">
      <span class="player-icon">🧑</span>
      <span class="player-name">You</span>
      <div class="captured" id="captured-human"></div>
    </div>
  </div>

  <div id="status">Loading engine…</div>

  <div id="board-wrap">
    <div class="coords-rank" id="coords-rank"></div>
    <div id="board"></div>
    <div class="coords-file" id="coords-file"></div>
  </div>

  <div id="controls">
    <button id="btn-new">+ New Game</button>
    <div id="nav-controls">
      <button id="btn-first" title="First move">⏮</button>
      <button id="btn-prev" title="Previous move">❮</button>
      <button id="btn-playpause" title="Play/Pause">▶</button>
      <button id="btn-next" title="Next move">❯</button>
      <button id="btn-last" title="Last move (live)">⏭</button>
    </div>
    <span id="move-counter">0 / 0</span>
    <div id="side-select">
      Play as:
      <label><input type="radio" name="side" value="w" checked> White</label>
      <label><input type="radio" name="side" value="b"> Black</label>
    </div>
    <div id="time-wrap">
      Engine:
      <select id="time-sel">
        <option value="500">0.5s</option>
        <option value="1000" selected>1s</option>
        <option value="2000">2s</option>
        <option value="5000">5s</option>
        <option value="10000">10s</option>
      </select>
    </div>
  </div>

  <!-- Promotion picker -->
  <div id="promo-modal">
    <div id="promo-box"></div>
  </div>

  <div id="info">
    Pet Dragon by <strong>Gokul Chandar</strong> · Engine: Claude (Anthropic) · GPL v3<br>
    <a href="https://github.com/g-c-3/pet-dragon">github.com/g-c-3/pet-dragon</a>
  </div>

</div>

<script type="module">
// ── Import WASM ───────────────────────────────────────────────────────────────
import init, {
  engine_name, engine_version,
  new_game, search_from_fen, legal_moves_from_fen
} from './pkg/pet_dragon.js';

// ── Piece Unicode map ─────────────────────────────────────────────────────────
const PIECES = {
  K:'♔', Q:'♕', R:'♖', B:'♗', N:'♘', P:'♙',
  k:'♚', q:'♛', r:'♜', b:'♝', n:'♞', p:'♟',
};

// ── State ─────────────────────────────────────────────────────────────────────
let fen        = '';          // current (live) FEN — the actual, real game position
let selected   = null;        // selected square index (0-63) or null
let legalMoves = [];          // legal move strings from current position
let lastMove   = null;        // {from, to} squares of the most recent live move
let flipped    = false;       // board orientation
let humanSide  = 'w';         // 'w' or 'b'
let sideLocked = false;       // true once Play-as is locked in for this game
let history    = [];          // FEN before each move played so far (live game)
let moveHighlights = [];      // {from,to} for each move played, aligned with `history`
let captureLog     = [];      // captured piece letter (or null) for each move, aligned with `history`
let viewIndex  = 0;           // which position the board is showing (0..history.length)
let playTimer  = null;        // interval id while move-by-move autoplay is running
let engineBusy = false;
let gameEnded  = false;        // true once the LIVE game has actually concluded
let gameEndMessage = null;     // the final status text (checkmate/draw) to show at the live position
let aiMode     = false;        // true = engine plays both sides (self-play)
let pendingPromo = null;      // {from, to} awaiting promotion choice

// The move navigator lets you browse every position played so far without
// touching the real game: `history` + the live `fen` together form the full
// list of positions (index 0 = start, index history.length = live/current).
// `viewIndex` picks which one render() shows; the live game itself (fen,
// history, engine moves) is completely unaffected by browsing.
function positionsList() { return history.concat([fen]); }
function displayedFen()  { return positionsList()[viewIndex]; }
function isLive()        { return viewIndex === history.length; }


// ── Helpers ───────────────────────────────────────────────────────────────────
const idx  = (file, rank) => rank * 8 + file; // 0-based, rank 0 = rank 1
const file = (sq) => sq % 8;
const rank = (sq) => Math.floor(sq / 8);

function sqName(sq) {
  return 'abcdefgh'[file(sq)] + (rank(sq) + 1);
}

function parseFen(fen) {
  // Returns board[sq] = piece char ('K','p', etc.) or ''
  const board = new Array(64).fill('');
  const rows  = fen.split(' ')[0].split('/');
  for (let r = 0; r < 8; r++) {
    const row = rows[7 - r]; // FEN rank 8 first
    let f = 0;
    for (const ch of row) {
      if (ch >= '1' && ch <= '8') {
        f += parseInt(ch);
      } else {
        board[idx(f, r)] = ch;
        f++;
      }
    }
  }
  return board;
}

function sideToMove(fen) {
  return fen.split(' ')[1]; // 'w' or 'b'
}

function isPromoMove(from, to, board) {
  const piece = board[from];
  if (piece !== 'P' && piece !== 'p') return false;
  const toRank = rank(to);
  return (piece === 'P' && toRank === 7) || (piece === 'p' && toRank === 0);
}

function getStatus(fen, board) {
  const side  = sideToMove(fen);
  const legal = legal_moves_from_fen(fen).trim();
  if (!legal) {
    // No legal moves — checkmate or stalemate
    // Check if king is in check by seeing if any opponent move attacks king square
    // Simple: try to fetch legal moves for the position
    return side === 'w'
      ? '♚ Checkmate — Black wins!'
      : '♔ Checkmate — White wins!';
  }
  return side === 'w' ? "White to move" : "Black to move";
}

// ── Coordinate labels ───────────────────────────────────────────────────────
// Derived directly from the same square-iteration order render() uses to fill
// the grid (display=63..0, sq = flipped ? 63-display : display), rather than
// hardcoded a..h/1..8, so labels stay correct even if that iteration order
// is ever changed.
function renderCoords() {
  const rankEl = document.getElementById('coords-rank');
  const fileEl = document.getElementById('coords-file');
  rankEl.innerHTML = '';
  fileEl.innerHTML = '';

  for (let row = 0; row < 8; row++) {
    const k  = row * 8;
    const sq = flipped ? k : 63 - k;
    const el = document.createElement('div');
    el.className   = 'coord';
    el.textContent = String(rank(sq) + 1);
    rankEl.appendChild(el);
  }
  for (let col = 0; col < 8; col++) {
    const k  = 56 + col;
    const sq = flipped ? k : 63 - k;
    const el = document.createElement('div');
    el.className   = 'coord';
    el.textContent = 'abcdefgh'[file(sq)];
    fileEl.appendChild(el);
  }
}

// ── Board render ──────────────────────────────────────────────────────────────
function render() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  renderCoords();

  const viewFen  = displayedFen();
  const board    = parseFen(viewFen);
  const side     = sideToMove(viewFen);
  const viewedLastMove = viewIndex > 0 ? moveHighlights[viewIndex - 1] : null;

  document.getElementById('panel-engine').classList.toggle('active', side !== humanSide);
  document.getElementById('panel-human').classList.toggle('active', side === humanSide);
  document.getElementById('panel-human').querySelector('.player-name').textContent =
    humanSide === 'w' ? 'You (White)' : 'You (Black)';
  updateWinProb(board, viewFen);
  renderCaptured();
  const legal    = legal_moves_from_fen(viewFen).split(' ').filter(Boolean);
  const legalTo  = selected !== null
    ? new Set(legal.filter(m => m.slice(0,2) === sqName(selected)).map(m => m.slice(2,4)))
    : new Set();

  // Build squares (flipped = black at bottom)
  for (let display = 63; display >= 0; display--) {
    const sq      = flipped ? (63 - display) : display;
    const f       = file(sq);
    const r       = rank(sq);
    const isLight = (f + r) % 2 !== 0;

    const cell = document.createElement('div');
    cell.className = 'sq ' + (isLight ? 'light' : 'dark');
    cell.dataset.sq = sq;

    // Highlight the move that led to the position being viewed
    if (viewedLastMove) {
      if (sq === viewedLastMove.from) cell.classList.add('last-from');
      if (sq === viewedLastMove.to)   cell.classList.add('last-to');
    }
    // Selected
    if (sq === selected) cell.classList.add('selected');

    // Legal destination indicator
    const sqN = sqName(sq);
    if (legalTo.has(sqN)) {
      if (board[sq]) cell.classList.add('legal-capture');
      else           cell.classList.add('legal-dot');
    }

    // Piece
    if (board[sq]) {
      const p = document.createElement('div');
      p.className = 'piece piece-' + board[sq];
      cell.appendChild(p);
    }

    cell.addEventListener('click', () => onSquareClick(sq));
    boardEl.appendChild(cell);
  }

  // Status
  const legal2 = legal_moves_from_fen(viewFen).trim();
  if (gameEnded && isLive()) {
    document.getElementById('status').textContent = gameEndMessage;
  } else if (!legal2) {
    document.getElementById('status').textContent =
      side === 'w' ? '♔ Checkmate — Black wins!' : '♚ Checkmate — White wins!';
  } else if (!engineBusy) {
    document.getElementById('status').textContent =
      side === 'w' ? 'White to move' : 'Black to move';
  }

  updateNavControls();
  updateSideSelectState();
}

// ── Captured pieces tray ────────────────────────────────────────────────────────
// Captures are logged move-by-move as they happen (see detectCapture(), called
// from applyMove()/maybeEngineMove()), not inferred by diffing piece counts.
// That matters because of promotion: a diff-based count would misread a
// promoted pawn as "a captured pawn" the moment it turns into a queen, and
// would misattribute that queen if it's later captured. Logging the actual
// piece taken on each move (including en-passant) keeps a promoted queen
// correctly counted as a queen capture, not a pawn.
const CAP_ORDER = ['q', 'r', 'b', 'n', 'p']; // display order, most valuable first

// Returns the piece letter captured by `uciMove` played from `fenStr`, or
// null if the move captures nothing. Handles normal captures and en passant.
function detectCapture(fenStr, uciMove) {
  const parts  = fenStr.split(' ');
  const board  = parseFen(fenStr);
  const fromSq = squareIndex(uciMove.slice(0,2));
  const toSq   = squareIndex(uciMove.slice(2,4));
  const piece  = board[fromSq];
  const prevEP = parts[3];

  if (board[toSq]) return board[toSq]; // normal capture

  if ((piece === 'P' || piece === 'p') && prevEP !== '-' && uciMove.slice(2,4) === prevEP) {
    const capRank = piece === 'P' ? rank(toSq) - 1 : rank(toSq) + 1;
    return board[idx(file(toSq), capRank)] || null;
  }
  return null;
}

// Tally of captures up to (not including) move index `uptoIndex`, i.e. as of
// whatever position the navigator is currently showing.
function computeCapturedTallies(uptoIndex) {
  const tally = { w: { q:0, r:0, b:0, n:0, p:0 }, b: { q:0, r:0, b:0, n:0, p:0 } };
  for (let i = 0; i < uptoIndex; i++) {
    const cap = captureLog[i];
    if (!cap) continue;
    const color = cap === cap.toUpperCase() ? 'w' : 'b';
    const t = cap.toLowerCase();
    if (tally[color][t] !== undefined) tally[color][t]++;
  }
  return tally;
}

function fillCapturedTally(elId, counts, color) {
  const el = document.getElementById(elId);
  el.innerHTML = '';
  for (const t of CAP_ORDER) {
    const n = counts[t] || 0;
    if (!n) continue;
    const item = document.createElement('div');
    item.className = 'cap-item';
    const glyph = color === 'w' ? t.toUpperCase() : t; // render in the captured piece's own color
    const icon = document.createElement('div');
    icon.className = 'cap-piece piece-' + glyph;
    const count = document.createElement('span');
    count.className = 'cap-count';
    count.textContent = n;
    item.appendChild(icon);
    item.appendChild(count);
    el.appendChild(item);
  }
}

function renderCaptured() {
  const tally = computeCapturedTallies(viewIndex);

  const humanColor  = humanSide;
  const engineColor = humanSide === 'w' ? 'b' : 'w';

  // Engine's tray shows the human's pieces it has captured; the human's
  // tray shows the engine's pieces they've captured.
  fillCapturedTally('captured-engine', tally[humanColor],  humanColor);
  fillCapturedTally('captured-human',  tally[engineColor], engineColor);
}

// ── Win probability meter ──────────────────────────────────────────────────────
// The engine's WASM API only exposes a best move (search_from_fen), not a
// numeric evaluation score, so this is a heuristic estimate rather than a
// true engine evaluation. It blends three signals so the percentage moves
// even without captures:
//   1. Material   — standard piece values.
//   2. Board control — central squares are worth more, weighted per piece
//      type (knights/bishops prize the center most; pawns are scored on
//      advancement instead); recomputed for every piece on every move.
//   3. Mobility   — how many legal moves each side currently has. White's
//      count comes straight from legal_moves_from_fen(fen) when it's White's
//      turn; the other side's count is approximated by flipping the side-
//      to-move field and querying the same function. This is a mobility
//      approximation only (it can include moves that would leave that side's
//      own king in check), not a legality check — it's just used as an eval
//      signal, never to actually move a piece.
// All three are combined into a centipawn-ish score, then passed through a
// logistic curve to get a 0–100% split. It recomputes from scratch on every
// render(), so it updates after every move by either side.

const PIECE_VALUE = { p: 100, n: 320, b: 330, r: 500, q: 900 }; // king excluded
const CENTRAL_WEIGHT = { n: 6, b: 4, q: 2, r: 1.5 };            // cp per centralisation unit

function centralization(sq) {
  const df = Math.abs(file(sq) - 3.5), dr = Math.abs(rank(sq) - 3.5);
  return (3.5 - df) + (3.5 - dr); // 0 (edge) .. 7 (center four squares)
}

function flipSideFen(fenStr) {
  const parts = fenStr.split(' ');
  parts[1] = parts[1] === 'w' ? 'b' : 'w';
  parts[3] = '-'; // en-passant target isn't meaningful once we've hand-flipped the side
  return parts.join(' ');
}

function countLegalMoves(fenStr) {
  try {
    const s = (legal_moves_from_fen(fenStr) || '').trim();
    return s ? s.split(' ').filter(Boolean).length : 0;
  } catch (e) {
    return 0;
  }
}

function updateWinProb(board, viewFen) {
  const sideNow      = sideToMove(viewFen);
  const mobilityNow   = countLegalMoves(viewFen);

  // Checkmate (per this app's convention: no legal moves = the side to move
  // has lost) — show 100% for the winner instead of the previous running
  // estimate.
  let whitePct;
  if (!mobilityNow) {
    whitePct = sideNow === 'w' ? 0 : 100;
  } else {
    let whiteMaterial = 0, blackMaterial = 0;
    let whitePositional = 0, blackPositional = 0;

    for (let sq = 0; sq < 64; sq++) {
      const p = board[sq];
      if (!p) continue;
      const lower  = p.toLowerCase();
      const isWhite = p === p.toUpperCase();
      const matVal = PIECE_VALUE[lower] || 0;

      let posVal;
      if (lower === 'p') {
        const advanced = isWhite ? rank(sq) : (7 - rank(sq)); // 0..7, 0 = start rank
        posVal = advanced * 6 + centralization(sq) * 1.5;
      } else if (lower === 'k') {
        posVal = 0; // no king-safety modeling here
      } else {
        posVal = centralization(sq) * (CENTRAL_WEIGHT[lower] || 0);
      }

      if (isWhite) { whiteMaterial += matVal; whitePositional += posVal; }
      else         { blackMaterial += matVal; blackPositional += posVal; }
    }

    const mobilityOther = countLegalMoves(flipSideFen(viewFen));
    const whiteMobility  = sideNow === 'w' ? mobilityNow : mobilityOther;
    const blackMobility  = sideNow === 'w' ? mobilityOther : mobilityNow;

    const diff =
      (whiteMaterial   - blackMaterial) +
      (whitePositional - blackPositional) +
      (whiteMobility   - blackMobility) * 8; // ~8cp per extra legal move

    whitePct = Math.round(100 / (1 + Math.exp(-diff / 300)));
  }
  const blackPct = 100 - whitePct;

  // Display order: Engine first, then You (swapped from White/Black-first).
  // In AI Self-Play there's no "you", so it stays White-first/Black-second.
  const engineSide = humanSide === 'w' ? 'b' : 'w';
  const enginePct  = engineSide === 'w' ? whitePct : blackPct;
  const playerPct  = 100 - enginePct;

  const leftName  = aiMode ? 'White'  : 'Engine';
  const rightName = aiMode ? 'Black'  : 'You';
  const leftPct   = aiMode ? whitePct : enginePct;
  const rightPct  = aiMode ? blackPct : playerPct;

  document.getElementById('winprob-left-name').textContent  = leftName;
  document.getElementById('winprob-right-name').textContent = rightName;
  document.getElementById('winprob-left-pct').textContent   = leftPct + '%';
  document.getElementById('winprob-right-pct').textContent  = rightPct + '%';
  document.getElementById('winprob-fill').style.width = whitePct + '%';
}
function onSquareClick(sq) {
  if (aiMode) return;
  if (engineBusy) return;
  if (gameEnded) return; // game over — no more moves
  if (!isLive()) return; // reviewing history — not interactive
  const side = sideToMove(fen);
  if (side !== humanSide) return; // not player's turn

  const board = parseFen(fen);
  const legal = legal_moves_from_fen(fen).split(' ').filter(Boolean);

  if (selected === null) {
    // Select a piece
    const piece = board[sq];
    if (!piece) return;
    const isWhite = piece === piece.toUpperCase();
    if ((side === 'w') !== isWhite) return; // wrong colour
    selected = sq;
    render();
    return;
  }

  // Attempt move: selected → sq
  const fromName = sqName(selected);
  const toName   = sqName(sq);

  // Find matching legal moves
  const candidates = legal.filter(m => m.slice(0,2) === fromName && m.slice(2,4) === toName);

  if (candidates.length === 0) {
    // Click on another own piece — reselect
    const piece = board[sq];
    if (piece) {
      const isWhite = piece === piece.toUpperCase();
      if ((side === 'w') === isWhite) {
        selected = sq;
        render();
        return;
      }
    }
    selected = null;
    render();
    return;
  }

  // Promotion?
  if (isPromoMove(selected, sq, board)) {
    pendingPromo = { from: selected, to: sq };
    selected = null;
    showPromoModal(side === 'w');
    return;
  }

  // Execute move
  executeMove(candidates[0]);
}

function executeMove(moveStr) {
  selected = null;
  // Push current FEN for undo
  history.push(fen);

  // Apply move: use engine's legal_moves to get new fen by navigating UCI move list
  // We build the new FEN by appending the move to a position command and re-searching.
  // Simplest approach: call search_from_fen with 1ms to get the position FEN after move.
  // Better: track move history and rebuild FEN by applying moves from startpos.
  //
  // Since the WASM doesn't expose "apply_move" directly, we keep a move history list
  // and reconstruct FEN by calling legal_moves_from_fen iteratively.
  // For now: store the UCI move and rebuild via the fenHistory + moveHistory approach.

  applyMove(moveStr);
}

// ── Move application ──────────────────────────────────────────────────────────
// We maintain a move list from the starting position and reconstruct the
// FEN each time by calling into the engine with a perft-style walk.
// Since WASM doesn't expose apply_move directly, we use a JS-side FEN applicator.

let startFen  = '';
let moveList  = []; // list of UCI move strings played so far

function applyMove(uciMove) {
  moveList.push(uciMove);

  // Rebuild FEN by using the engine to return the position FEN.
  // We call search_from_fen with 0ms just to get the resulting state — but
  // that won't work (we can't apply a move without an apply_move export).
  //
  // Instead: implement a JS-side move applier for the subset of moves we need.
  // This is the standard approach in browser chess UIs (e.g., chess.js).

  const wasLive = viewIndex === history.length - 1; // history.length already includes this move's pre-state push
  const prevFen = history[history.length - 1] || startFen;
  const newFen  = applyMoveToFen(prevFen, uciMove);
  captureLog.push(detectCapture(prevFen, uciMove));

  const from = squareIndex(uciMove.slice(0,2));
  const to   = squareIndex(uciMove.slice(2,4));
  lastMove = { from, to };
  moveHighlights.push({ from, to });
  fen = newFen;
  if (wasLive) viewIndex = history.length; // keep the navigator following live play
  checkGameEndAndCelebrate();

  render();
  maybeEngineMove();
}

function squareIndex(name) {
  const f = 'abcdefgh'.indexOf(name[0]);
  const r = parseInt(name[1]) - 1;
  return idx(f, r);
}

// ── JS-side FEN applicator ────────────────────────────────────────────────────
// Applies a UCI move to a FEN string and returns the new FEN.
// Handles: quiet, capture, castling, en passant, double push, promotion.

function applyMoveToFen(fenStr, uciMove) {
  const parts   = fenStr.split(' ');
  let board     = parseFen(fenStr);
  const side    = parts[1];
  let castle    = parts[2];
  let ep        = '-';
  let halfmove  = parseInt(parts[4]) + 1;
  let fullmove  = parseInt(parts[5]);

  const fromSq  = squareIndex(uciMove.slice(0,2));
  const toSq    = squareIndex(uciMove.slice(2,4));
  const promoC  = uciMove[4]; // 'q','r','b','n' or undefined
  const piece   = board[fromSq];

  // En passant target from previous FEN
  const prevEP  = parts[3];

  // Reset halfmove on pawn move or capture
  if (piece === 'P' || piece === 'p' || board[toSq]) halfmove = 0;

  // En passant capture
  if ((piece === 'P' || piece === 'p') && uciMove.slice(2,4) === prevEP) {
    const capRank = piece === 'P' ? rank(toSq) - 1 : rank(toSq) + 1;
    board[idx(file(toSq), capRank)] = '';
  }

  // Set double-push EP target (works for Pet Dragon rank 1→3 and standard rank 2→4)
  if ((piece === 'P' && rank(toSq) - rank(fromSq) === 2) ||
      (piece === 'p' && rank(fromSq) - rank(toSq) === 2)) {
    const epRank = Math.floor((rank(fromSq) + rank(toSq)) / 2);
    ep = 'abcdefgh'[file(toSq)] + (epRank + 1); // +1 converts 0-index to FEN rank number
  }

  // Castling: move rook too
  if (piece === 'K' && fromSq === squareIndex('e1')) {
    if (toSq === squareIndex('g1')) { // kingside
      board[squareIndex('f1')] = 'R';
      board[squareIndex('h1')] = '';
    } else if (toSq === squareIndex('c1')) { // queenside
      board[squareIndex('d1')] = 'R';
      board[squareIndex('a1')] = '';
    }
    castle = castle.replace('K','').replace('Q','') || '-';
  }
  if (piece === 'k' && fromSq === squareIndex('e8')) {
    if (toSq === squareIndex('g8')) {
      board[squareIndex('f8')] = 'r';
      board[squareIndex('h8')] = '';
    } else if (toSq === squareIndex('c8')) {
      board[squareIndex('d8')] = 'r';
      board[squareIndex('a8')] = '';
    }
    castle = castle.replace('k','').replace('q','') || '-';
  }

  // Update castling rights on rook move/capture
  if (fromSq === squareIndex('h1') || toSq === squareIndex('h1')) castle = castle.replace('K','');
  if (fromSq === squareIndex('a1') || toSq === squareIndex('a1')) castle = castle.replace('Q','');
  if (fromSq === squareIndex('h8') || toSq === squareIndex('h8')) castle = castle.replace('k','');
  if (fromSq === squareIndex('a8') || toSq === squareIndex('a8')) castle = castle.replace('q','');
  if (!castle) castle = '-';

  // Move piece
  board[toSq]   = promoC ? (side === 'w' ? promoC.toUpperCase() : promoC.toLowerCase()) : piece;
  board[fromSq] = '';

  // Flip side
  const newSide = side === 'w' ? 'b' : 'w';
  if (side === 'b') fullmove++;

  // Rebuild FEN piece placement
  let placement = '';
  for (let r = 7; r >= 0; r--) {
    let empty = 0;
    for (let f = 0; f < 8; f++) {
      const p = board[idx(f,r)];
      if (p) {
        if (empty) { placement += empty; empty = 0; }
        placement += p;
      } else {
        empty++;
      }
    }
    if (empty) placement += empty;
    if (r > 0) placement += '/';
  }

  return `${placement} ${newSide} ${castle} ${ep} ${halfmove} ${fullmove}`;
}

// ── Game-end detection & celebration ───────────────────────────────────────────
// Checked once after every LIVE move (never while just browsing history via
// the navigator). Covers: no legal moves (this app's existing convention
// treats that as checkmate), the 50-move rule, threefold repetition, and
// insufficient material. First condition met wins and fires the fireworks.

function positionKey(fenStr) {
  // Placement + side + castling + en-passant — the standard fields used to
  // compare positions for repetition (halfmove/fullmove counters excluded).
  return fenStr.split(' ').slice(0, 4).join(' ');
}

function isInsufficientMaterial(board) {
  const rest = board.filter(p => p && p.toLowerCase() !== 'k');
  if (rest.length === 0) return true;                                    // K v K
  if (rest.length === 1 && /[bn]/i.test(rest[0])) return true;            // K+minor v K
  if (rest.length === 2 && rest.every(p => p.toLowerCase() === 'b')) {
    // K+B v K+B is only a dead draw if both bishops are the same square color.
    const bishopSquares = [];
    for (let sq = 0; sq < 64; sq++) {
      if (board[sq] && board[sq].toLowerCase() === 'b') bishopSquares.push(sq);
    }
    if (bishopSquares.length === 2) {
      const colorOf = s => (file(s) + rank(s)) % 2;
      if (colorOf(bishopSquares[0]) === colorOf(bishopSquares[1])) return true;
    }
  }
  return false;
}

function checkGameEndAndCelebrate() {
  if (gameEnded) return;

  const board    = parseFen(fen);
  const legal    = legal_moves_from_fen(fen).trim();
  const sideNow  = sideToMove(fen);
  const halfmove = parseInt(fen.split(' ')[4]) || 0;

  let message = null;

  if (!legal) {
    // No dedicated "is this side in check" export, so — matching this app's
    // existing convention — no legal moves is treated as checkmate.
    message = sideNow === 'w' ? '♔ Checkmate — Black wins!' : '♚ Checkmate — White wins!';
  } else if (halfmove >= 100) {
    message = '🤝 Draw — 50-move rule';
  } else if (isInsufficientMaterial(board)) {
    message = '🤝 Draw — insufficient material';
  } else {
    const counts = {};
    for (const pos of history.concat([fen])) {
      const key = positionKey(pos);
      counts[key] = (counts[key] || 0) + 1;
      if (counts[key] >= 3) { message = '🤝 Draw — threefold repetition'; break; }
    }
  }

  if (message) {
    gameEnded = true;
    gameEndMessage = message;
    launchFireworks();
  }
}

function launchFireworks() {
  const canvas = document.getElementById('firework-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#ff924c', '#f0d08a'];
  let particles = [];

  function spawnBurst(x, y) {
    const count = 46;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
      const speed = 2.5 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 55 + Math.random() * 25,
        age: 0,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 2 + Math.random() * 2,
      });
    }
  }

  const w = canvas.width, h = canvas.height;
  const burstPlan = [
    [w * 0.25, h * 0.32, 0],
    [w * 0.5,  h * 0.22, 220],
    [w * 0.75, h * 0.32, 440],
    [w * (0.2 + Math.random() * 0.6), h * (0.2 + Math.random() * 0.25), 700],
    [w * (0.2 + Math.random() * 0.6), h * (0.2 + Math.random() * 0.25), 950],
  ];
  burstPlan.forEach(([x, y, delay]) => setTimeout(() => spawnBurst(x, y), delay));

  let animFrame;
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of particles) {
      p.age++;
      p.vy += 0.05; // gravity
      p.x += p.vx;
      p.y += p.vy;
      ctx.globalAlpha = Math.max(0, 1 - p.age / p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    particles = particles.filter(p => p.age < p.life);
    animFrame = requestAnimationFrame(tick);
  }
  tick();

  setTimeout(() => {
    cancelAnimationFrame(animFrame);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }, 3800);
}

// ── Promotion modal ───────────────────────────────────────────────────────────
function showPromoModal(isWhite) {
  const pieces = isWhite
    ? [['q','♕'],['r','♖'],['b','♗'],['n','♘']]
    : [['q','♛'],['r','♜'],['b','♝'],['n','♞']];

  const box = document.getElementById('promo-box');
  box.innerHTML = '';
  pieces.forEach(([code, glyph]) => {
    const el = document.createElement('div');
    el.className   = 'promo-choice';
    el.textContent = glyph;
    el.addEventListener('click', () => {
      document.getElementById('promo-modal').classList.remove('show');
      const move = sqName(pendingPromo.from) + sqName(pendingPromo.to) + code;
      pendingPromo = null;
      history.push(fen);
      applyMove(move);
    });
    box.appendChild(el);
  });
  document.getElementById('promo-modal').classList.add('show');
}

// ── Engine move ───────────────────────────────────────────────────────────────
async function maybeEngineMove() {
  // Re-entrancy guard: never let two searches overlap (e.g. a toggle click
  // landing while a search from the previous move is still resolving).
  if (engineBusy) return;
  if (gameEnded) return; // live game already concluded — nothing more to play

  const side = sideToMove(fen);
  // In normal mode the engine only moves for the non-human side.
  // In AI self-play mode it moves for whichever side is to move, always.
  if (!aiMode && side === humanSide) return;

  const legal = legal_moves_from_fen(fen).trim();
  if (!legal) return; // game over

  engineBusy = true;
  document.getElementById('status').textContent = '🐉 Engine thinking…';

  const ms = parseInt(document.getElementById('time-sel').value);

  // Run in a microtask so the UI updates first
  await new Promise(r => setTimeout(r, 10));

  const bestmove = search_from_fen(fen, ms);
  engineBusy = false;

  if (!bestmove || bestmove === '0000') {
    document.getElementById('status').textContent = 'Game over';
    return;
  }

  const wasLive = isLive(); // computed before this move's history push, unlike applyMove()
  history.push(fen);
  const from = squareIndex(bestmove.slice(0,2));
  const to   = squareIndex(bestmove.slice(2,4));
  lastMove   = { from, to };
  moveHighlights.push({ from, to });
  captureLog.push(detectCapture(fen, bestmove));
  fen        = applyMoveToFen(fen, bestmove);
  if (wasLive) viewIndex = history.length; // keep the navigator following live play
  checkGameEndAndCelebrate();

  render();

  // Self-play: keep going for the next side too, as long as AI mode is
  // still on and the game hasn't just ended in checkmate/draw. If the
  // switch got flipped off while this move was being calculated, this
  // check simply stops the loop here — no crash, no orphaned timers —
  // and control passes back to whichever side is human via the normal
  // (side !== humanSide) path on the next move.
  if (aiMode && !gameEnded) {
    setTimeout(maybeEngineMove, 10);
  }
}

// ── New game ──────────────────────────────────────────────────────────────────
function startNewGame() {
  if (engineBusy) return;
  stopPlayback();
  fen       = new_game();
  startFen  = fen;
  moveList  = [];
  history   = [];
  moveHighlights = [];
  captureLog = [];
  viewIndex = 0;
  gameEnded = false;
  gameEndMessage = null;
  lastMove  = null;
  selected  = null;
  engineBusy = false;

  // Reset "Play as" back to an open, unlocked choice (defaulting to White)
  // and board orientation to match.
  humanSide  = 'w';
  sideLocked = false;
  flipped    = false;
  document.querySelector('input[name=side][value="w"]').checked = true;
  document.querySelector('input[name=side][value="b"]').checked = false;

  // AI Self-Play always starts off on a new game.
  aiMode = false;
  document.getElementById('ai-toggle').checked = false;

  render();

  // Note: humanSide is always 'w' and aiMode always off at this point (just
  // reset above), so the engine never needs to move immediately here.
  // Picking Black or turning on AI Self-Play during the open window is what
  // triggers the engine's first move — see those two handlers below.
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('btn-new').addEventListener('click', startNewGame);

// ── Move navigator ──────────────────────────────────────────────────────────
// Pure viewing controls: stepping through history never touches the real
// game state (fen/history/engine) — it only changes which position render()
// draws. The live game (including any ongoing AI Self-Play) keeps running
// underneath exactly as before; hitting "last" always jumps back to it.
function stopPlayback() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
  document.getElementById('btn-playpause').textContent = '▶';
}

function startPlayback() {
  if (playTimer) return;
  document.getElementById('btn-playpause').textContent = '⏸';
  playTimer = setInterval(() => {
    if (viewIndex >= history.length) { stopPlayback(); return; }
    viewIndex++;
    render();
  }, 700);
}

function updateNavControls() {
  const total = history.length;
  document.getElementById('move-counter').textContent = `${viewIndex} / ${total}`;
  document.getElementById('btn-first').disabled      = viewIndex === 0;
  document.getElementById('btn-prev').disabled       = viewIndex === 0;
  document.getElementById('btn-next').disabled       = viewIndex === total;
  document.getElementById('btn-last').disabled       = viewIndex === total;
  document.getElementById('btn-playpause').disabled  = total === 0;
}

// "Play as" is only choosable for the game's first two half-moves — it
// locks the moment either two plies have been played (the player never
// touched it) or the player explicitly picks a side (locks immediately).
// Uses the LIVE ply count (history.length), not the navigator's viewIndex,
// so browsing old positions never re-opens or re-locks it.
function updateSideSelectState() {
  if (history.length >= 2) sideLocked = true;
  const active = !aiMode && !sideLocked;
  const el = document.getElementById('side-select');
  el.classList.toggle('disabled', !active);
  el.classList.toggle('pulsate', active);
  document.querySelectorAll('input[name=side]').forEach(r => { r.disabled = !active; });
}

document.getElementById('btn-first').addEventListener('click', () => {
  stopPlayback();
  viewIndex = 0;
  render();
});

document.getElementById('btn-prev').addEventListener('click', () => {
  stopPlayback();
  if (viewIndex > 0) viewIndex--;
  render();
});

document.getElementById('btn-next').addEventListener('click', () => {
  stopPlayback();
  if (viewIndex < history.length) viewIndex++;
  render();
});

document.getElementById('btn-last').addEventListener('click', () => {
  stopPlayback();
  viewIndex = history.length;
  render();
});

document.getElementById('btn-playpause').addEventListener('click', () => {
  if (playTimer) stopPlayback();
  else startPlayback();
});

document.getElementById('ai-toggle').addEventListener('change', (e) => {
  aiMode = e.target.checked;
  updateSideSelectState();
  updateWinProb(parseFen(displayedFen()), displayedFen()); // labels (You/Engine vs White/Black) depend on aiMode

  if (aiMode) {
    // Turning self-play on: kick off a move if nothing is already running.
    // If a search from the previous (human/engine) turn is still in
    // flight, maybeEngineMove's own re-entrancy guard will simply skip
    // this call, and the loop picks up naturally once that move lands.
    maybeEngineMove();
  }
  // Turning self-play off requires no action here: the in-flight search
  // (if any) finishes normally, and the `if (aiMode)` check at the end of
  // maybeEngineMove stops the loop right there, handing the board back to
  // whichever side is human on the next move.
});

document.querySelectorAll('input[name=side]').forEach(r => {
  r.addEventListener('change', () => {
    if (sideLocked || aiMode) return; // shouldn't fire while disabled, but guard anyway
    humanSide   = r.value;
    flipped     = (r.value === 'b'); // auto-flip so your side is at the bottom
    sideLocked  = true;              // picking a side locks it in immediately
    render();
    maybeEngineMove(); // in case it's now the engine's turn under the new side
  });
});

// ── WASM init ─────────────────────────────────────────────────────────────────
(async () => {
  try {
    await init();
    document.getElementById('status').textContent =
      `${engine_name()} ${engine_version()} ready`;
    startNewGame();
  } catch (e) {
    document.getElementById('status').textContent = 'Error loading engine: ' + e;
    console.error(e);
  }
})();
</script>
</body>
</html>
